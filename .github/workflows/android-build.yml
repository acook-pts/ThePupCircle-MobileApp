name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'ThePupCircle.MobileApp.csproj'
  CONFIGURATION: 'Release'

jobs:
  build-android:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install .NET MAUI workload
      run: dotnet workload install maui
      
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
      
    - name: Build Android App (Debug)
      if: github.event_name == 'pull_request'
      run: |
        dotnet build ${{ env.PROJECT_PATH }} `
          -c Debug `
          -f net10.0-android `
          /p:AndroidPackageFormat=apk
          
    - name: Build Android App (Release - Unsigned)
      if: github.event_name == 'push' && github.ref != 'refs/heads/main'
      run: |
        dotnet build ${{ env.PROJECT_PATH }} `
          -c ${{ env.CONFIGURATION }} `
          -f net10.0-android `
          /p:AndroidPackageFormat=apk
          
    - name: Decode Android Keystore
      if: github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_FILE }}")
        [IO.File]::WriteAllBytes("${{ github.workspace }}/thepupcircle.keystore", $bytes)

    - name: Build Android App Bundle (Signed)
      if: github.ref == 'refs/heads/main'
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          -c ${{ env.CONFIGURATION }} `
          -f net10.0-android `
          /p:AndroidPackageFormat=aab `
          /p:AndroidKeyStore=true `
          /p:AndroidSigningKeyStore="${{ github.workspace }}/thepupcircle.keystore" `
          /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} `
          /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} `
          /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        
    - name: Upload Android APK (Debug/Dev)
      if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-${{ github.sha }}
        path: |
          **/bin/${{ env.CONFIGURATION }}/net10.0-android/*-Signed.apk
          **/bin/Debug/net10.0-android/*.apk
        retention-days: 30
        
    - name: Upload Android AAB (Production)
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: android-aab-production-${{ github.sha }}
        path: |
          **/bin/${{ env.CONFIGURATION }}/net10.0-android/publish/*.aab
        retention-days: 90
        
    - name: Create Release Notes
      if: github.ref == 'refs/heads/main'
      run: |
        echo "# Android Build - Production" > release-notes.txt
        echo "Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> release-notes.txt
        echo "Commit: ${{ github.sha }}" >> release-notes.txt
        echo "Branch: ${{ github.ref_name }}" >> release-notes.txt
        
    - name: Upload Release Notes
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: release-notes-android
        path: release-notes.txt
